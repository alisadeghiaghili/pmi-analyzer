name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ------------------------------------------------------------------ #
  #  Job 1: Auto-format (ruff fix + black) then commit back             #
  # ------------------------------------------------------------------ #
  format:
    name: Auto-format (ruff + black)
    runs-on: ubuntu-latest
    # Only auto-commit on direct pushes (not PRs from forks)
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install formatters
        run: |
          pip install --upgrade pip
          pip install black ruff

      - name: Run ruff --fix
        run: ruff check pmi_analyzer/ tests/ --fix --exit-zero

      - name: Run black
        run: black pmi_analyzer/ tests/

      - name: Commit formatting changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (
            git add pmi_analyzer/ tests/ &&
            git commit -m "style: auto-format via ruff + black [skip ci]"
          )
          git push

  # ------------------------------------------------------------------ #
  #  Job 2: Test matrix (runs after format job)                         #
  # ------------------------------------------------------------------ #
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: format
    if: always()

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          allow-prereleases: true   # needed for 3.14

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type check (mypy)
        run: mypy pmi_analyzer/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=pmi_analyzer \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
