name: Monthly Shamkh Update

on:
  schedule:
    # Run on the 10th of every month at 08:00 UTC (11:30 Tehran time)
    - cron: '0 8 10 * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run monthly update
        id: update
        run: |
          python scripts/phase4_monthly_update.py --verbose
        continue-on-error: true

      - name: Commit updated CSV (if new data)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/shamkh_historical.csv
          git diff --cached --quiet || git commit -m "data: auto-update shamkh $(date +'%Y-%m')"
          git push
